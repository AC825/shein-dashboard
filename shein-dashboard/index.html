<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电商数据平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 粒子背景 -->
<canvas id="particle-canvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:0;opacity:0.25"></canvas>

<!-- ==================== 登录/注册页面 ==================== -->
<div id="auth-page" style="display:none">
  <div class="auth-bg">
    <div class="auth-container">
      <!-- Logo区域 -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <path d="M18 2L4 10V26L18 34L32 26V10L18 2Z" stroke="url(#lg1)" stroke-width="1.5" fill="rgba(124,58,237,0.15)"/>
            <path d="M18 8L10 13V23L18 28L26 23V13L18 8Z" fill="url(#lg2)" opacity="0.8"/>
            <circle cx="18" cy="18" r="3" fill="#fff" opacity="0.9"/>
            <defs>
              <linearGradient id="lg1" x1="4" y1="2" x2="32" y2="34" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7c3aed"/><stop offset="1" stop-color="#06b6d4"/>
              </linearGradient>
              <linearGradient id="lg2" x1="10" y1="8" x2="26" y2="28" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7c3aed"/><stop offset="1" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <div class="auth-logo-text">电商数据平台</div>
          <div class="auth-logo-sub">CROSS-BORDER ANALYTICS PLATFORM</div>
        </div>
      </div>

      <!-- 登录/注册 Tab -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">注册</button>
      </div>

      <!-- 登录表单 -->
      <div id="form-login">
        <div class="auth-form-group">
          <label class="auth-label">账号 / 手机号</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="login-phone" class="auth-input" placeholder="输入账号或手机号" maxlength="20" autocomplete="username">
          </div>
        </div>
        <div class="auth-form-group">
          <label class="auth-label">密码</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="login-pass" class="auth-input" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="auth-eye" onclick="togglePwd('login-pass',this)" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="auth-error" style="display:none"></div>
        <button class="auth-btn" onclick="doLogin()" id="btn-login" type="button">
          <span id="login-btn-text">登 录</span>
        </button>
        <div class="auth-footer-tip">还没有账号？<a onclick="switchAuthTab('register')">立即注册</a></div>
      </div>

      <!-- 注册表单 -->
      <div id="form-register" style="display:none">
        <div class="auth-form-group">
          <label class="auth-label">手机号</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/>
            </svg>
            <input type="tel" id="reg-phone" class="auth-input" placeholder="请输入手机号" maxlength="11">
          </div>
        </div>
        <div class="auth-form-group">
          <label class="auth-label">昵称（可选）</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="reg-nickname" class="auth-input" placeholder="您的昵称">
          </div>
        </div>
        <div class="auth-form-group">
          <label class="auth-label">设置密码</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="reg-pass" class="auth-input" placeholder="至少6位密码">
            <button class="auth-eye" onclick="togglePwd('reg-pass',this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="auth-form-group">
          <label class="auth-label">确认密码</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="reg-pass2" class="auth-input" placeholder="再次输入密码" onkeydown="if(event.key==='Enter')doRegister()">
          </div>
        </div>
        <div id="reg-error" class="auth-error" style="display:none"></div>
        <button class="auth-btn" onclick="doRegister()" id="btn-register">
          <span id="reg-btn-text">注 册</span>
        </button>
        <div class="auth-footer-tip">已有账号？<a onclick="switchAuthTab('login')">直接登录</a></div>
      </div>

    </div>
    <!-- 装饰线条 -->
    <div class="auth-deco auth-deco-1"></div>
    <div class="auth-deco auth-deco-2"></div>
  </div>
</div>

<!-- ==================== 主应用 ==================== -->
<div id="app" style="display:none">
  <!-- 顶部进度条 -->
  <div id="nprogress-bar"><div id="nprogress-fill"></div></div>

  <!-- 侧边栏 -->
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-icon-wrap">
        <svg width="26" height="26" viewBox="0 0 36 36" fill="none">
          <path d="M18 2L4 10V26L18 34L32 26V10L18 2Z" stroke="url(#sl1)" stroke-width="1.5" fill="rgba(124,58,237,0.2)"/>
          <path d="M18 9L11 13.5V22.5L18 27L25 22.5V13.5L18 9Z" fill="url(#sl2)"/>
          <circle cx="18" cy="18" r="2.5" fill="white" opacity="0.9"/>
          <defs>
            <linearGradient id="sl1" x1="4" y1="2" x2="32" y2="34" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7c3aed"/><stop offset="1" stop-color="#06b6d4"/>
            </linearGradient>
            <linearGradient id="sl2" x1="11" y1="9" x2="25" y2="27" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7c3aed"/><stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div>
        <div class="logo-text">电商数据平台</div>
        <div class="logo-sub">CROSS-BORDER ANALYTICS</div>
      </div>
    </div>
    <nav>
      <div class="nav-group">
        <div class="nav-label">核心功能</div>
        <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </span><span>数据看板</span>
          <span class="nav-badge" id="nb-dashboard"></span>
        </a>
        <a class="nav-item" data-page="styles" onclick="navigate('styles')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </span><span>款式分析</span>
        </a>
        <a class="nav-item" data-page="revenue" onclick="navigate('revenue')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </span><span>营业额统计</span>
        </a>
        <a class="nav-item" data-page="profit" onclick="navigate('profit')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            </svg>
          </span><span>利润计算</span>
        </a>
        <a class="nav-item" data-page="alert" onclick="navigate('alert')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </span><span>预警中心</span>
          <span class="nav-badge show" id="nb-alert">3</span>
        </a>
        <a class="nav-item" data-page="import" onclick="navigate('import')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </span><span>数据导入</span>
        </a>
        <a class="nav-item" data-page="academy" onclick="navigate('academy')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </span><span>知识学院</span>
        </a>
      </div>
      <div class="nav-group" id="nav-shops-group">
        <div class="nav-label">
          店铺管理
          <span id="shop-count-badge" class="nav-count">0</span>
        </div>
        <a class="nav-item" data-page="shops" onclick="navigate('shops')">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </span><span>所有店铺</span>
        </a>
        <div id="shop-list-nav"></div>
        <a class="nav-item add-shop" onclick="openAddShop()">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </span><span>添加店铺</span>
        </a>
      </div>
    </nav>

    <!-- 侧边栏底部 -->
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user" onclick="navigate('profile')">
        <div class="sidebar-user-avatar" id="user-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">用户</div>
          <div class="sidebar-user-role" id="user-role">成员</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="sidebar-footer-info">
        <span id="total-data-count">-- 条数据</span>
        <span class="dot-sep">·</span>
        <span id="shop-total-count">-- 家店铺</span>
      </div>
      <a class="sidebar-logout" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        退出登录
      </a>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main id="main">
    <!-- 顶部导航栏 -->
    <div id="topbar">
      <div id="breadcrumb"></div>
      <div class="topbar-right">
        <span id="sync-status" style="font-size:12px;color:#94a3b8;margin-right:8px"></span>
        <span id="exchange-rate-display" style="font-size:11px;color:#f59e0b;margin-right:8px;cursor:help;background:rgba(245,158,11,0.1);padding:2px 7px;border-radius:4px;border:1px solid rgba(245,158,11,0.2)" title="实时汇率">1 USD = ¥7.20</span>
        <span id="topbar-date" class="topbar-date"></span>
        <button class="topbar-bigscreen" onclick="toggleBigScreen()" id="bigscreen-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          大屏
        </button>
        <button class="topbar-btn" onclick="manualSync()" title="从云端同步最新数据">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.44"/></svg>
        </button>
        <button class="topbar-btn" onclick="refreshCurrentPage()" title="刷新页面">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <!-- 权限管理（仅管理员可见） -->
        <button class="topbar-btn admin-only" id="btn-admin" onclick="navigate('admin')" title="权限管理" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <!-- 手机端用户头像快捷入口（桌面端隐藏，手机端显示） -->
        <div id="topbar-user-mini" style="display:none" onclick="showMobileMenu()">
          <div class="sidebar-user-avatar" id="topbar-avatar" style="width:28px;height:28px;font-size:12px;cursor:pointer">U</div>
        </div>
      </div>
    </div>

    <!-- 页面容器 -->
    <div id="page-container">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-styles" class="page"></div>
      <div id="page-revenue" class="page"></div>
      <div id="page-profit" class="page"></div>
      <div id="page-alert" class="page"></div>
      <div id="page-import" class="page"></div>
      <div id="page-shops" class="page"></div>
      <div id="page-shop-detail" class="page"></div>
      <div id="page-academy" class="page"></div>
      <div id="page-admin" class="page"></div>
      <div id="page-profile" class="page"></div>
    </div>
  </main>
</div>

<!-- 添加店铺弹窗 -->
<div id="modal-add-shop" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        添加新店铺
      </h3>
      <button class="modal-close" onclick="closeModal('modal-add-shop')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>店铺名称 <span style="color:#f87171">*</span></label>
      <input type="text" id="new-shop-name" placeholder="例如：SHEIN官方店1号">
    </div>
    <div class="form-group">
      <label>店铺ID（可选）</label>
      <input type="text" id="new-shop-id" placeholder="例如：shop_001">
    </div>
    <div class="form-group">
      <label>所属平台</label>
      <select id="new-shop-platform">
        <optgroup label="🇨🇳 国内平台（人民币 ¥）">
          <option value="淘宝">淘宝</option>
          <option value="天猫">天猫</option>
          <option value="京东">京东</option>
          <option value="拼多多">拼多多</option>
          <option value="抖音小店">抖音小店</option>
          <option value="快手小店">快手小店</option>
          <option value="小红书">小红书</option>
          <option value="唯品会">唯品会</option>
        </optgroup>
        <optgroup label="🌍 跨境平台（美元 $）">
          <option value="SHEIN" selected>SHEIN</option>
          <option value="Amazon">Amazon</option>
          <option value="Temu">Temu</option>
          <option value="TikTok Shop">TikTok Shop</option>
          <option value="Shopee">Shopee</option>
          <option value="Lazada">Lazada</option>
          <option value="AliExpress">AliExpress</option>
          <option value="Wish">Wish</option>
          <option value="eBay">eBay</option>
          <option value="Etsy">Etsy</option>
          <option value="独立站">独立站</option>
        </optgroup>
        <optgroup label="其他">
          <option value="其他国内">其他国内平台</option>
          <option value="其他跨境">其他跨境平台</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label>月营收目标（可选）</label>
      <input type="number" id="new-shop-target" placeholder="例如：50000">
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal('modal-add-shop')">取消</button>
      <button class="btn-primary" onclick="addShop()">确认添加</button>
    </div>
  </div>
</div>

<!-- 知识学院 - 新增文章弹窗 -->
<div id="modal-add-article" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:600px;width:95%">
    <div class="modal-header">
      <h3>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        分享知识
      </h3>
      <button class="modal-close" onclick="closeModal('modal-add-article')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>文章标题 <span style="color:#f87171">*</span></label>
      <input type="text" id="article-title" placeholder="例如：SHEIN爆款选品技巧分享">
    </div>
    <div class="form-group">
      <label>分类</label>
      <select id="article-category">
        <option>运营经验</option><option>选品技巧</option><option>物流仓储</option><option>广告投放</option><option>数据分析</option><option>其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>内容 <span style="color:#f87171">*</span></label>
      <textarea id="article-content" rows="8" placeholder="分享你的经验、技巧或心得..." style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;resize:vertical;line-height:1.6;outline:none"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal('modal-add-article')">取消</button>
      <button class="btn-primary" onclick="submitArticle()">发布分享</button>
    </div>
  </div>
</div>

<!-- Toast 通知 -->
<div id="toast" class="toast">
  <span id="toast-icon"></span>
  <span id="toast-text"></span>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
</body>
</html>
