<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHEIN 跨境数据中台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 顶部进度条 -->
<div id="nprogress-bar"><div id="nprogress-fill"></div></div>

<div id="app">
  <!-- 侧边栏 -->
  <aside id="sidebar">
    <div class="logo">
      <span class="logo-icon">🛍️</span>
      <div>
        <div class="logo-text">SHEIN 数据中台</div>
        <div class="logo-sub">CROSS-BORDER ANALYTICS</div>
      </div>
    </div>
    <nav>
      <div class="nav-group">
        <div class="nav-label">核心功能</div>
        <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span><span>数据看板</span>
          <span class="nav-badge" id="nb-dashboard"></span>
        </a>
        <a class="nav-item" data-page="styles" onclick="navigate('styles')">
          <span class="nav-icon">👗</span><span>款式分析</span>
        </a>
        <a class="nav-item" data-page="revenue" onclick="navigate('revenue')">
          <span class="nav-icon">💰</span><span>营业额统计</span>
        </a>
        <a class="nav-item" data-page="profit" onclick="navigate('profit')">
          <span class="nav-icon">📐</span><span>利润计算</span>
        </a>
        <a class="nav-item" data-page="alert" onclick="navigate('alert')">
          <span class="nav-icon">🔔</span><span>预警中心</span>
          <span class="nav-badge show" id="nb-alert">3</span>
        </a>
        <a class="nav-item" data-page="import" onclick="navigate('import')">
          <span class="nav-icon">📁</span><span>数据导入</span>
        </a>
      </div>
      <div class="nav-group">
        <div class="nav-label">店铺管理
          <span id="shop-count-badge" class="nav-count">0</span>
        </div>
        <a class="nav-item" data-page="shops" onclick="navigate('shops')">
          <span class="nav-icon">🏪</span><span>所有店铺</span>
        </a>
        <div id="shop-list-nav"></div>
        <a class="nav-item add-shop" onclick="openAddShop()">
          <span class="nav-icon">➕</span><span>添加店铺</span>
        </a>
      </div>
    </nav>

    <!-- 侧边栏底部 -->
    <div class="sidebar-footer">
      <div class="sidebar-footer-info">
        <span id="total-data-count">-- 条数据</span>
        <span class="dot-sep">·</span>
        <span id="shop-total-count">-- 家店铺</span>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main id="main">
    <!-- 顶部导航栏 -->
    <div id="topbar">
      <div id="breadcrumb"></div>
      <div class="topbar-right">
        <span id="sync-status" style="font-size:12px;color:#94a3b8;margin-right:8px"></span>
        <span id="topbar-date" class="topbar-date"></span>
        <button class="topbar-bigscreen" onclick="toggleBigScreen()" id="bigscreen-btn">⛶ 大屏</button>
        <button class="topbar-btn" onclick="manualSync()" title="从云端同步最新数据" style="font-size:13px">⟳</button>
        <button class="topbar-btn" onclick="refreshCurrentPage()" title="刷新页面">↻</button>
      </div>
    </div>

    <!-- 页面容器 -->
    <div id="page-container">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-styles" class="page"></div>
      <div id="page-revenue" class="page"></div>
      <div id="page-profit" class="page"></div>
      <div id="page-alert" class="page"></div>
      <div id="page-import" class="page"></div>
      <div id="page-shops" class="page"></div>
      <div id="page-shop-detail" class="page"></div>
    </div>
  </main>
</div>

<!-- 添加店铺弹窗 -->
<div id="modal-add-shop" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>✦ 添加新店铺</h3>
      <button class="modal-close" onclick="closeModal('modal-add-shop')">✕</button>
    </div>
    <div class="form-group">
      <label>店铺名称 <span style="color:#f87171">*</span></label>
      <input type="text" id="new-shop-name" placeholder="例如：SHEIN官方店1号">
    </div>
    <div class="form-group">
      <label>店铺ID（可选）</label>
      <input type="text" id="new-shop-id" placeholder="例如：shop_001">
    </div>
    <div class="form-group">
      <label>所属平台</label>
      <select id="new-shop-platform">
        <option>SHEIN</option>
        <option>Temu</option>
        <option>AliExpress</option>
        <option>其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>月营收目标（可选）</label>
      <input type="number" id="new-shop-target" placeholder="例如：50000">
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal('modal-add-shop')">取消</button>
      <button class="btn-primary" onclick="addShop()">✦ 确认添加</button>
    </div>
  </div>
</div>

<!-- Toast 通知 -->
<div id="toast" class="toast">
  <span id="toast-icon"></span>
  <span id="toast-text"></span>
</div>

<!-- 粒子画布（科技感背景） -->
<canvas id="particle-canvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:0;opacity:0.3"></canvas>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
