<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="128" height="128" rx="28.16" ry="28.16" fill="url(#bg)"/>
  <!-- 装饰圆 -->
  <circle cx="108.8" cy="19.2" r="23.04" fill="#6366f1" opacity="0.2"/>
  <circle cx="19.2" cy="108.8" r="15.36" fill="#34d399" opacity="0.15"/>
  <!-- 主图标：折线图 -->
  <g transform="translate(19, 19)">
    <!-- 坐标轴 -->
    <line x1="9" y1="76.5" x2="85.5" y2="76.5" stroke="#6366f1" stroke-width="3.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="9" y1="13.5" x2="9" y2="76.5" stroke="#6366f1" stroke-width="3.2" stroke-linecap="round" opacity="0.5"/>
    <!-- 折线（亮紫色） -->
    <polyline 
      points="9,62.99999999999999 27,45 45,54 62.99999999999999,27 81,18"
      fill="none" stroke="url(#icon)" stroke-width="6.4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 折线下方填充 -->
    <polygon 
      points="9,62.99999999999999 27,45 45,54 62.99999999999999,27 81,18 81,76.5 9,76.5"
      fill="url(#icon)" opacity="0.15"/>
    <!-- 数据点 -->
    <circle cx="27" cy="45" r="5.12" fill="#a78bfa"/>
    <circle cx="45" cy="54" r="5.12" fill="#a78bfa"/>
    <circle cx="62.99999999999999" cy="27" r="5.12" fill="#a78bfa"/>
    <!-- 柱状图（绿色，右下角小装饰） -->
    <rect x="55.8" y="55.8" width="7.2" height="20.7" rx="2.56" fill="url(#icon2)" opacity="0.7"/>
    <rect x="66.6" y="46.800000000000004" width="7.2" height="29.700000000000003" rx="2.56" fill="url(#icon2)" opacity="0.7"/>
    <rect x="77.4" y="37.8" width="7.2" height="38.7" rx="2.56" fill="url(#icon2)" opacity="0.7"/>
  </g>
</svg>