<?xml version="1.0" encoding="UTF-8"?>
<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="72" height="72" rx="15.84" ry="15.84" fill="url(#bg)"/>
  <!-- 装饰圆 -->
  <circle cx="61.199999999999996" cy="10.799999999999999" r="12.959999999999999" fill="#6366f1" opacity="0.2"/>
  <circle cx="10.799999999999999" cy="61.199999999999996" r="8.64" fill="#34d399" opacity="0.15"/>
  <!-- 主图标：折线图 -->
  <g transform="translate(10, 10)">
    <!-- 坐标轴 -->
    <line x1="5.2" y1="44.199999999999996" x2="49.4" y2="44.199999999999996" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="5.2" y1="7.8" x2="5.2" y2="44.199999999999996" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <!-- 折线（亮紫色） -->
    <polyline 
      points="5.2,36.4 15.6,26 26,31.2 36.4,15.6 46.800000000000004,10.4"
      fill="none" stroke="url(#icon)" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 折线下方填充 -->
    <polygon 
      points="5.2,36.4 15.6,26 26,31.2 36.4,15.6 46.800000000000004,10.4 46.800000000000004,44.199999999999996 5.2,44.199999999999996"
      fill="url(#icon)" opacity="0.15"/>
    <!-- 数据点 -->
    <circle cx="15.6" cy="26" r="2.88" fill="#a78bfa"/>
    <circle cx="26" cy="31.2" r="2.88" fill="#a78bfa"/>
    <circle cx="36.4" cy="15.6" r="2.88" fill="#a78bfa"/>
    <!-- 柱状图（绿色，右下角小装饰） -->
    <rect x="32.24" y="32.24" width="4.16" height="11.96" rx="1.44" fill="url(#icon2)" opacity="0.7"/>
    <rect x="38.48" y="27.04" width="4.16" height="17.16" rx="1.44" fill="url(#icon2)" opacity="0.7"/>
    <rect x="44.72" y="21.84" width="4.16" height="22.36" rx="1.44" fill="url(#icon2)" opacity="0.7"/>
  </g>
</svg>