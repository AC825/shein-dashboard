    <line x1="10.200000000000001" y1="86.7" x2="96.89999999999999" y2="86.7" stroke="#6366f1" stroke-width="3.6" stroke-linecap="round" opacity="0.5"/>
    <line x1="10.200000000000001" y1="15.299999999999999" x2="10.200000000000001" y2="86.7" stroke="#6366f1" stroke-width="3.6" stroke-linecap="round" opacity="0.5"/>
    <!-- 折线（亮紫色） -->
