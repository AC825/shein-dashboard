    <rect x="63.24" y="63.24" width="8.16" height="23.46" rx="2.88" fill="url(#icon2)" opacity="0.7"/>
    <rect x="75.48" y="53.04" width="8.16" height="33.660000000000004" rx="2.88" fill="url(#icon2)" opacity="0.7"/>
