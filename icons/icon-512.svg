<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="112.64" ry="112.64" fill="url(#bg)"/>
  <!-- 装饰圆 -->
  <circle cx="435.2" cy="76.8" r="92.16" fill="#6366f1" opacity="0.2"/>
  <circle cx="76.8" cy="435.2" r="61.44" fill="#34d399" opacity="0.15"/>
  <!-- 主图标：折线图 -->
  <g transform="translate(76, 76)">
    <!-- 坐标轴 -->
    <line x1="36" y1="306" x2="342" y2="306" stroke="#6366f1" stroke-width="12.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="36" y1="54" x2="36" y2="306" stroke="#6366f1" stroke-width="12.8" stroke-linecap="round" opacity="0.5"/>
    <!-- 折线（亮紫色） -->
    <polyline 
      points="36,251.99999999999997 108,180 180,216 251.99999999999997,108 324,72"
      fill="none" stroke="url(#icon)" stroke-width="25.6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 折线下方填充 -->
    <polygon 
      points="36,251.99999999999997 108,180 180,216 251.99999999999997,108 324,72 324,306 36,306"
      fill="url(#icon)" opacity="0.15"/>
    <!-- 数据点 -->
    <circle cx="108" cy="180" r="20.48" fill="#a78bfa"/>
    <circle cx="180" cy="216" r="20.48" fill="#a78bfa"/>
    <circle cx="251.99999999999997" cy="108" r="20.48" fill="#a78bfa"/>
    <!-- 柱状图（绿色，右下角小装饰） -->
    <rect x="223.2" y="223.2" width="28.8" height="82.8" rx="10.24" fill="url(#icon2)" opacity="0.7"/>
    <rect x="266.4" y="187.20000000000002" width="28.8" height="118.80000000000001" rx="10.24" fill="url(#icon2)" opacity="0.7"/>
    <rect x="309.6" y="151.2" width="28.8" height="154.8" rx="10.24" fill="url(#icon2)" opacity="0.7"/>
  </g>
