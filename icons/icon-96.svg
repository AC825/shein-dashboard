<?xml version="1.0" encoding="UTF-8"?>
<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="96" height="96" rx="21.12" ry="21.12" fill="url(#bg)"/>
  <!-- 装饰圆 -->
  <circle cx="81.6" cy="14.399999999999999" r="17.28" fill="#6366f1" opacity="0.2"/>
  <circle cx="14.399999999999999" cy="81.6" r="11.52" fill="#34d399" opacity="0.15"/>
  <!-- 主图标：折线图 -->
  <g transform="translate(14, 14)">
    <!-- 坐标轴 -->
    <line x1="6.800000000000001" y1="57.8" x2="64.6" y2="57.8" stroke="#6366f1" stroke-width="2.4000000000000004" stroke-linecap="round" opacity="0.5"/>
    <line x1="6.800000000000001" y1="10.2" x2="6.800000000000001" y2="57.8" stroke="#6366f1" stroke-width="2.4000000000000004" stroke-linecap="round" opacity="0.5"/>
    <!-- 折线（亮紫色） -->
    <polyline 
      points="6.800000000000001,47.599999999999994 20.4,34 34,40.8 47.599999999999994,20.4 61.2,13.600000000000001"
      fill="none" stroke="url(#icon)" stroke-width="4.800000000000001" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 折线下方填充 -->
    <polygon 
      points="6.800000000000001,47.599999999999994 20.4,34 34,40.8 47.599999999999994,20.4 61.2,13.600000000000001 61.2,57.8 6.800000000000001,57.8"
      fill="url(#icon)" opacity="0.15"/>
    <!-- 数据点 -->
    <circle cx="20.4" cy="34" r="3.84" fill="#a78bfa"/>
    <circle cx="34" cy="40.8" r="3.84" fill="#a78bfa"/>
    <circle cx="47.599999999999994" cy="20.4" r="3.84" fill="#a78bfa"/>
    <!-- 柱状图（绿色，右下角小装饰） -->
    <rect x="42.16" y="42.16" width="5.44" height="15.64" rx="1.92" fill="url(#icon2)" opacity="0.7"/>
    <rect x="50.32" y="35.36" width="5.44" height="22.44" rx="1.92" fill="url(#icon2)" opacity="0.7"/>
    <rect x="58.48" y="28.56" width="5.44" height="29.24" rx="1.92" fill="url(#icon2)" opacity="0.7"/>
  </g>
</svg>