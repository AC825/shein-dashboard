    <line x1="13.600000000000001" y1="115.6" x2="129.2" y2="115.6" stroke="#6366f1" stroke-width="4.800000000000001" stroke-linecap="round" opacity="0.5"/>
    <line x1="13.600000000000001" y1="20.4" x2="13.600000000000001" y2="115.6" stroke="#6366f1" stroke-width="4.800000000000001" stroke-linecap="round" opacity="0.5"/>
